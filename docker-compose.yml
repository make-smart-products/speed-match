services:
  speed-match:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_PATH: "/data/speedmatch.db"
      UPLOAD_DIR: "/data/uploads"
      CORS_ORIGIN: "*"
      STATIC_DIR: "/app/web/dist"
    volumes:
      - speedmatch-data:/data

volumes:
  speedmatch-data:
