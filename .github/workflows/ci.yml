name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go test
        working-directory: backend
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Frontend build
        working-directory: web
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t speed-match .
